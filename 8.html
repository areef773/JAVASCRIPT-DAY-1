<!DOCTYPE html>
<html>
<head>
  <title>Change Text</title>
</head>
<body>

  <h2>Text Change Example</h2>

  <p id="text">This is the original text.</p>
  <button onclick="changeText()">Click Me</button>

  <script>
    function changeText() {
      document.getElementById("text").textContent = "The text has been changed!";
    }
  </script>

</body>
</html>
